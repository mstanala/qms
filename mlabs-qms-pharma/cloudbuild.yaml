steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/mlabs-qms-pharma', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mlabs-qms-pharma']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mlabs-qms-pharma'
      - '--image=gcr.io/$PROJECT_ID/mlabs-qms-pharma'
      - '--region=us-central1'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=long-way-476920-g7:us-central1:healthtriage'

images:
  - 'gcr.io/$PROJECT_ID/mlabs-qms-pharma'